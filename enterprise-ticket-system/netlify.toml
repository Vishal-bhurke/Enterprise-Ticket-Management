[build]
  publish = "dist/enterprise-ticket-system/browser"
  command = "npm install && npm run build"

# Post-deploy test runner — fires after successful deployment, never blocks deploy
[[plugins]]
  package = "./netlify/plugins/run-tests"

[context.production.environment]
  NODE_ENV = "production"

# SPA redirect — Angular handles all client-side routing
# Without this, Netlify returns 404 for any direct URL or page refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html must NOT be cached — always fetch fresh so new deploys propagate instantly
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# JS chunks are content-hashed by Angular build — safe to cache aggressively for 1 year
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS files are also content-hashed — safe to cache aggressively for 1 year
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
